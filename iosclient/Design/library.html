<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Reader - Library</title>
    <style>
        :root {
            --bg-main: #FFFFFF;
            --bg-sub: #F8FAFC;        /* 极淡的灰蓝，用于分类小标题背景 */
            --primary: #0066FF;       /* 纯正皇家蓝 (Royal Blue) */
            --text-dark: #1E293B;     /* 深石墨黑，用于大标题和主文字 */
            --text-sub: #94A3B8;      /* 辅助灰色字，用于时间、单词量描述 */
            --border: #F1F5F9;        /* 极细的浅灰分割线 */
            
            /* 分类色彩标签 */
            --tag-blue: #0066FF;
            --tag-orange: #F59E0B;
            --tag-green: #10B981;
            --tag-purple: #8B5CF6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #0F172A;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 手机容器模拟 */
        .phone-container {
            width: 375px;
            height: 712px;
            background: var(--bg-main);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
        }

        /* 顶部导航栏：左侧大标题，右侧极简添加按钮 */
        .nav-header {
            padding: 24px 20px 16px 20px;
            background: var(--bg-main);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-dark);
            letter-spacing: -0.5px;
        }

        /* 右侧正方形极简添加按钮 */
        .btn-add-article {
            width: 36px;
            height: 36px;
            background: var(--bg-sub);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--primary);
            font-size: 20px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .btn-add-article:active {
            background: var(--primary);
            color: #FFFFFF;
            border-color: var(--primary);
        }

        /* 日期分组灰条 */
        .date-divider {
            background: var(--bg-sub);
            padding: 6px 20px;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
        }

        /* 列表容器 */
        .list-container {
            flex: 1;
            overflow-y: auto;
            background: var(--bg-main);
        }

        /* 列表项结构（延续截图的左侧色彩短条设计） */
        .list-item {
            padding: 16px 20px 16px 24px; /* 留出左侧色彩条的呼吸空间 */
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            position: relative;
            transition: background 0.15s;
        }

        .list-item:active {
            background: var(--bg-sub);
        }

        /* 左侧微量色彩标签条 */
        .list-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: transparent;
        }
        .list-item.color-blue::before { background: var(--tag-blue); }
        .list-item.color-orange::before { background: var(--tag-orange); }
        .list-item.color-green::before { background: var(--tag-green); }
        .list-item.color-purple::before { background: var(--tag-purple); }

        /* 文章标题 */
        .item-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 4px;
            letter-spacing: -0.2px;
        }

        /* 时间与单词描述组 */
        .item-desc-meta {
            font-size: 12px;
            color: var(--text-sub);
            display: flex;
            gap: 12px; /* 时间和单词量拉开间距 */
        }

        /* 右侧箭头符号 */
        .arrow-icon {
            color: #CBD5E1;
            font-size: 12px;
            font-weight: 700;
        }

        /* 底部原生 Tab 栏 */
        .bottom-tab-bar {
            height: 64px;
            border-top: 1px solid var(--border);
            background: var(--bg-main);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: 4px;
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            color: var(--text-sub);
            font-size: 10px;
            font-weight: 600;
            gap: 4px;
        }

        .tab-item.active {
            color: var(--primary);
        }

        .tab-icon {
            font-size: 18px;
        }
    </style>
</head>
<body>

<div class="phone-container">

    <!-- 顶部导航栏 -->
    <div class="nav-header">
        <h1 class="nav-title">Library</h1>
        <!-- 右侧添加文章按钮 -->
        <button class="btn-add-article" onclick="alert('Trigger Add Article Action')">＋</button>
    </div>

    <!-- 列表区域 -->
    <div class="list-container">
        
        <!-- 分组：今天 -->
        <div class="date-divider">Today</div>
        
        <div class="list-item color-blue" onclick="alert('Open: Last Week on Mars')">
            <div>
                <div class="item-title">Last Week on Mars</div>
                <div class="item-desc-meta">
                    <span>Added 09:30</span>
                    <span>•</span>
                    <span>185 words</span>
                </div>
            </div>
            <div class="arrow-icon">➔</div>
        </div>

        <div class="list-item color-orange" onclick="alert('Open: The Secret Life of Cats')">
            <div>
                <div class="item-title">The Secret Life of Cats</div>
                <div class="item-desc-meta">
                    <span>Added 08:15</span>
                    <span>•</span>
                    <span>310 words</span>
                </div>
            </div>
            <div class="arrow-icon">➔</div>
        </div>

        <!-- 分组：昨天 -->
        <div class="date-divider">Yesterday</div>

        <div class="list-item color-green" onclick="alert('Open: Deep Ocean Exploration')">
            <div>
                <div class="item-title">Deep Ocean Exploration</div>
                <div class="item-desc-meta">
                    <span>Yesterday</span>
                    <span>•</span>
                    <span>524 words</span>
                </div>
            </div>
            <div class="arrow-icon">➔</div>
        </div>

        <div class="list-item color-purple" onclick="alert('Open: The Evolution of Architecture')">
            <div>
                <div class="item-title">The Evolution of Architecture</div>
                <div class="item-desc-meta">
                    <span>Yesterday</span>
                    <span>•</span>
                    <span>412 words</span>
                </div>
            </div>
            <div class="arrow-icon">➔</div>
        </div>

    </div>

    <!-- 底部 Tab 导航（保持与参考图一致） -->
    <div class="bottom-tab-bar">
        <div class="tab-item active">
            <span class="tab-icon">📋</span>
            <span>Library</span>
        </div>
        <div class="tab-item">
            <span class="tab-icon">🎧</span>
            <span>Station</span>
        </div>
        <div class="tab-item">
            <span class="tab-icon">⚙️</span>
            <span>Settings</span>
        </div>
    </div>

</div>

</body>
</html>
